<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Apothecary Academy Code V1</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>
</head>

<body>
    <div id="background">

        <header>
            <h1>Apothecary Academy</h1>
            <p>brew wisely. first player to reach 30 points wins.</p>
            <p>avoid rolling ones. especially avoid double ones for snake eyes will destroy your potion!</p>
        </header>

        <main>

            <section class="board">

                <article class="player">

                    <h2>player one</h2>

                    <div class="bottle fill-0" aria-label="Potion bottle showing brewing progress">

                        <div class="liquid"></div>

                        <img src="images/emptypotion.png" width="190" height="320" alt="empty potion bottle" class="potion-img">

                    </div>

                    <p>total brew score:</p>
                    <p class="score">0</p>

                    <img src="images/clover.png" width="80" height="80" alt="lucky four-leaf clover indicating whose turn it is" class="clover">

                </article>


                <section class="controls">

                    <nav>
                        <div id="box1"><button>Roll</button></div>
                        <div id="box2"><button>Hold</button></div>
                    </nav>

                </section>

                <article class="player">

                    <h2>player two</h2>

                    <div class="bottle fill-0" aria-label="Potion bottle showing brewing progress">

                        <div class="liquid"></div>

                        <img src="images/emptypotion.png" width="190" height="320" alt="empty potion bottle" class="potion-img">

                    </div>

                    <p>total brew score:</p>
                    <p class="score">0</p>
                    
                </article>

            </section>

        </main>

        <footer>
            <p>Page by Jade Young</p>
        </footer>
    </div>
</body>

</html>
